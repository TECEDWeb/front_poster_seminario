<!-- ============================================ -->
<!-- MENÚ HORIZONTAL (Desktop) -->
<!-- ============================================ -->
<nav class="menu-horizontal desktop-menu">
  <div class="menu-container-horizontal">
    <div class="menu-brand">
      <div class="logo-container">
        <span class="logo-text">Sistema</span>
        <span class="logo-badge">UPSE</span>
      </div>
    </div>

    <div class="menu-items">
      <ng-container *ngIf="usuario()?.rol === 'admin'">
        <a *ngFor="let item of adminMenuItems"
           class="menu-link"
           [routerLink]="item.route"
           routerLinkActive="active"
           #rla="routerLinkActive">
          <span class="menu-link-icon">
            <ion-icon [name]="rla.isActive ? item.iconActive : item.icon"></ion-icon>
          </span>
          <span class="menu-link-text">{{ item.label }}</span>
        </a>
      </ng-container>

      <ng-container *ngIf="usuario()?.rol === 'evaluador'">
        <a *ngFor="let item of evaluadorMenuItems"
           class="menu-link"
           [routerLink]="item.route"
           routerLinkActive="active"
           #rla="routerLinkActive">
          <span class="menu-link-icon">
            <ion-icon [name]="rla.isActive ? item.iconActive : item.icon"></ion-icon>
          </span>
          <span class="menu-link-text">{{ item.label }}</span>
        </a>
      </ng-container>
    </div>

    <div class="menu-actions">
      <div class="user-menu-wrapper">
        <button class="user-info-horizontal" (click)="toggleUserMenu($event)" [class.open]="userMenuOpen">
          <div class="avatar-small">{{ iniciales() }}</div>
          <span class="user-name">{{ (usuario()?.nombre || 'Usuario').split(' ')[0] }}</span>
          <ion-icon name="chevron-down-outline" class="chevron" [class.rotated]="userMenuOpen"></ion-icon>
        </button>

        <div class="user-dropdown" *ngIf="userMenuOpen">
          <div class="user-dropdown-header">
            <div class="avatar-medium">{{ iniciales() }}</div>
            <div class="user-dropdown-info">
              <strong>{{ usuario()?.nombre || 'Usuario' }}</strong>
              <span>{{ usuario()?.rol }}</span>
            </div>
          </div>
          <button class="dropdown-item logout" (click)="cerrarSesion()">
            <ion-icon name="log-out-outline"></ion-icon>
            <span>Cerrar sesión</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- ============================================ -->
<!-- MENÚ LATERAL (Móvil) - ion-menu real -->
<!-- ============================================ -->
<ion-menu #mainMenu contentId="main-content" side="start" menuId="main-menu" type="overlay" class="mobile-menu">
  <ion-header class="mobile-menu-header">
    <ion-toolbar>
      <div class="mobile-brand">
        <span class="logo-text">Sistema</span>
        <span class="logo-badge">UPSE</span>
      </div>
    </ion-toolbar>
  </ion-header>

  <ion-content class="mobile-menu-content">
    <div class="user-info" *ngIf="usuario() as u">
      <div class="avatar">{{ iniciales() }}</div>
      <div class="user-data">
        <strong>{{ u.nombre }}</strong>
        <span>{{ u.rol }}</span>
      </div>
    </div>

    <ion-list lines="none">
      <ng-container *ngIf="usuario()?.rol === 'admin'">
        <ion-item *ngFor="let item of adminMenuItems"
                  [routerLink]="item.route"
                  routerLinkActive="active"
                  #rla="routerLinkActive"
                  (click)="cerrarMenu()"
                  button
                  detail="false">
          <ion-icon [name]="rla.isActive ? item.iconActive : item.icon" slot="start"></ion-icon>
          {{ item.label }}
        </ion-item>
      </ng-container>

      <ng-container *ngIf="usuario()?.rol === 'evaluador'">
        <ion-item *ngFor="let item of evaluadorMenuItems"
                  [routerLink]="item.route"
                  routerLinkActive="active"
                  #rla="routerLinkActive"
                  (click)="cerrarMenu()"
                  button
                  detail="false">
          <ion-icon [name]="rla.isActive ? item.iconActive : item.icon" slot="start"></ion-icon>
          {{ item.label }}
        </ion-item>
      </ng-container>
    </ion-list>

    <div class="logout">
      <ion-button expand="block" fill="outline" color="danger" (click)="cerrarSesion()">
        <ion-icon name="log-out-outline" slot="start"></ion-icon>
        Cerrar sesión
      </ion-button>
    </div>
  </ion-content>
</ion-menu>
