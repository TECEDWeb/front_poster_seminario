<!-- Menú Horizontal (Desktop) -->
<nav class="menu-horizontal desktop-menu" *ngIf="!isMobile">
  <div class="menu-container-horizontal">
    <div class="menu-brand">
      <div class="logo-container">
        <span class="logo-text">Sistema</span>
        <span class="logo-badge">UPSE</span>
      </div>
    </div>

    <div class="menu-items">
      <ng-container *ngIf="usuario()?.rol === 'admin'">
        <a class="menu-link" routerLink="/admin/dashboard" routerLinkActive="active">
          <ion-icon name="grid-outline"></ion-icon>
          <span>Dashboard</span>
        </a>
        <a class="menu-link" routerLink="/admin/usuarios" routerLinkActive="active">
          <ion-icon name="people-outline"></ion-icon>
          <span>Usuarios</span>
        </a>
        <a class="menu-link" routerLink="/admin/concursos" routerLinkActive="active">
          <ion-icon name="trophy-outline"></ion-icon>
          <span>Concursos</span>
        </a>
        <a class="menu-link" routerLink="/admin/proyectos" routerLinkActive="active">
          <ion-icon name="folder-open-outline"></ion-icon>
          <span>Proyectos</span>
        </a>
        <a class="menu-link" routerLink="/admin/reportes" routerLinkActive="active">
          <ion-icon name="bar-chart-outline"></ion-icon>
          <span>Reportes</span>
        </a>
        <a class="menu-link" routerLink="/admin/rubricas" routerLinkActive="active">
          <ion-icon name="checkbox-outline"></ion-icon>
          <span>Rúbricas</span>
        </a>
        <a class="menu-link" routerLink="/admin/asignaciones" routerLinkActive="active">
          <ion-icon name="swap-horizontal-outline"></ion-icon>
          <span>Asignaciones</span>
        </a>
      </ng-container>

      <ng-container *ngIf="usuario()?.rol === 'evaluador'">
        <a class="menu-link" routerLink="/evaluador/dashboard" routerLinkActive="active">
          <ion-icon name="grid-outline"></ion-icon>
          <span>Dashboard</span>
        </a>
        <a class="menu-link" routerLink="/evaluador/proyectos-asignados" routerLinkActive="active">
          <ion-icon name="clipboard-outline"></ion-icon>
          <span>Proyectos</span>
        </a>
        <a class="menu-link" routerLink="/evaluador/mis-resultados" routerLinkActive="active">
          <ion-icon name="stats-chart-outline"></ion-icon>
          <span>Resultados</span>
        </a>
      </ng-container>
    </div>

    <div class="menu-actions">
      <div class="user-info-horizontal">
        <div class="avatar-small" *ngIf="usuario() as u">
          {{ iniciales() }}
        </div>
        <span class="user-name">{{ (usuario()?.nombre || 'Usuario').split(' ')[0] }}</span>
      </div>
      <button class="btn-logout" (click)="cerrarSesion()">
        <ion-icon name="log-out-outline"></ion-icon>
      </button>
    </div>
  </div>
</nav>

<!-- Menú Lateral (Móvil/Tablet) - Solo mostrar el botón hamburguesa -->
<ng-container *ngIf="isMobile">
  <!-- El ion-menu se maneja desde el layout -->
</ng-container>
