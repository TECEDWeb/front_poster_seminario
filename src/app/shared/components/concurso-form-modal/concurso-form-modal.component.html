<ion-header>
  <ion-toolbar>
    <ion-title>
      {{ editando ? 'Editar Concurso' : 'Crear Concurso' }}
    </ion-title>

    <ion-buttons slot="end">
      <ion-button (click)="cerrar()">Cerrar</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <form [formGroup]="form">

    <ion-item>
      <ion-input label="Nombre" labelPlacement="stacked" formControlName="nombre"></ion-input>
    </ion-item>

    <ion-item>
      <ion-textarea label="Descripción" labelPlacement="stacked" formControlName="descripcion"></ion-textarea>
    </ion-item>

    <ion-item>
      <ion-input type="date" label="Inicio" labelPlacement="stacked" formControlName="fechaInicio"></ion-input>
    </ion-item>

    <ion-item>
      <ion-input type="date" label="Fin" labelPlacement="stacked" formControlName="fechaFin"></ion-input>
    </ion-item>

    <ion-item>
      <ion-toggle formControlName="estado">Activo</ion-toggle>
    </ion-item>

    <ion-button expand="block" (click)="guardar()">
      Guardar
    </ion-button>

  </form>

</ion-content>
