<ion-modal
  [isOpen]="isOpen"
  (didDismiss)="cerrarModal()"
  class="seleccionar-modal"
  [initialBreakpoint]="1"
  [breakpoints]="[0, 1]"
  [handle]="true">

  <ng-template>
    <ion-header>
      <ion-toolbar class="modal-toolbar">
        <ion-title>
          <div class="modal-title-content">
            <ion-icon name="folder-open-outline" class="title-icon"></ion-icon>
            <span>Seleccionar proyecto</span>
          </div>
        </ion-title>
        <ion-buttons slot="end">
          <ion-button (click)="cerrarModal()" class="close-btn">
            <ion-icon name="close-outline"></ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>

    <ion-content class="modal-content">
      <div class="modal-container">

        <!-- FILTROS -->
        <div class="filtros-section">
          <div class="filtros-row">
            <div class="filtro-grupo search-group">
              <ion-searchbar
                [(ngModel)]="filtroBusqueda"
                (ionInput)="aplicarFiltros()"
                placeholder="Buscar proyecto..."
                class="search-input"
                animated>
                <ion-icon name="search-outline" slot="start"></ion-icon>
              </ion-searchbar>
            </div>

            <div class="filtro-grupo">
              <ion-select
                [(ngModel)]="filtroConcursoId"
                (ionChange)="aplicarFiltros()"
                placeholder="Todos los concursos"
                interface="popover"
                class="concurso-select">
                <ion-select-option [value]="null">Todos los concursos</ion-select-option>
                <ion-select-option *ngFor="let c of concursos" [value]="c.id">
                  {{ c.nombre }}
                </ion-select-option>
              </ion-select>
            </div>

            <ion-button
              fill="clear"
              size="small"
              class="btn-limpiar"
              (click)="limpiarFiltros()"
              *ngIf="filtroBusqueda || filtroConcursoId">
              <ion-icon name="close-outline"></ion-icon>
              Limpiar
            </ion-button>
          </div>
        </div>

        <!-- LISTA DE PROYECTOS -->
        <div class="lista-proyectos">
          <!-- Skeleton -->
          <div class="skeleton-list" *ngIf="cargando">
            <div class="skeleton-item" *ngFor="let i of [1,2,3,4,5]">
              <ion-skeleton-text animated class="skeleton-icon"></ion-skeleton-text>
              <div class="skeleton-info">
                <ion-skeleton-text animated class="skeleton-title"></ion-skeleton-text>
                <ion-skeleton-text animated class="skeleton-subtitle"></ion-skeleton-text>
              </div>
            </div>
          </div>

          <!-- Lista real -->
          <ng-container *ngIf="!cargando">
            <div
              class="proyecto-item"
              *ngFor="let p of proyectosFiltrados"
              [class.selected]="p.id === proyectoSeleccionadoId"
              (click)="seleccionarProyecto(p.id)">
              <div class="proyecto-icon" [class]="p.activo !== false ? 'active' : 'inactive'">
                <span>{{ (p.nombre || 'P').charAt(0).toUpperCase() }}</span>
              </div>
              <div class="proyecto-info">
                <span class="proyecto-nombre">{{ p.nombre }}</span>
                <div class="proyecto-meta">
                  <span class="meta-tag area">{{ p.area || 'Sin área' }}</span>
                  <span class="meta-tag nivel">{{ p.nivel || 'Sin nivel' }}</span>
                  <span class="meta-tag concurso" *ngIf="p.concurso_id">
                    <ion-icon name="trophy-outline"></ion-icon>
                    {{ getNombreConcurso(p.concurso_id) }}
                  </span>
                </div>
              </div>
              <div class="proyecto-check" *ngIf="p.id === proyectoSeleccionadoId">
                <ion-icon name="checkmark-circle-outline"></ion-icon>
              </div>
              <div class="proyecto-badge" *ngIf="p.activo === false">
                <ion-badge color="medium">Inactivo</ion-badge>
              </div>
            </div>

            <!-- Empty state -->
            <div class="empty-proyectos" *ngIf="proyectosFiltrados.length === 0">
              <ion-icon name="alert-circle-outline"></ion-icon>
              <p *ngIf="filtroBusqueda || filtroConcursoId">No hay proyectos con estos filtros</p>
              <p *ngIf="!filtroBusqueda && !filtroConcursoId">No hay proyectos disponibles</p>
            </div>
          </ng-container>
        </div>

      </div>
    </ion-content>
  </ng-template>
</ion-modal>
