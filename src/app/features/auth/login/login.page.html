<ion-content [fullscreen]="true" class="login-content">
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-brand">
        <img src="assets/logo/logo-institucional.jpeg" alt="Logo institucional" class="login-logo" />
        <h1 class="login-title">Sistema de Evaluación</h1>
        <p class="login-subtitle">Ingresa con tu cuenta institucional</p>
      </div>

      <form (ngSubmit)="onSubmit()" class="login-form" #loginForm="ngForm">

        <ion-item class="login-input" lines="none">
          <ion-icon name="person-outline" slot="start"></ion-icon>
          <ion-input
            type="text"
            inputmode="numeric"
            placeholder="Cédula"
            [(ngModel)]="cedula"
            name="cedula"
            autocomplete="username"
            required>
          </ion-input>
        </ion-item>

        <ion-item class="login-input" lines="none">
          <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
          <ion-input
            [type]="mostrarPassword ? 'text' : 'password'"
            placeholder="Contraseña"
            [(ngModel)]="password"
            name="password"
            autocomplete="current-password"
            required>
          </ion-input>
          <ion-button
            slot="end"
            fill="clear"
            type="button"
            class="toggle-password"
            (click)="mostrarPassword = !mostrarPassword"
            aria-label="Mostrar u ocultar contraseña">
            <ion-icon [name]="mostrarPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
          </ion-button>
        </ion-item>

        <div class="login-error" *ngIf="errorMensaje()">
          <ion-icon name="alert-circle-outline"></ion-icon>
          <span>{{ errorMensaje() }}</span>
        </div>

        <ion-button
          type="submit"
          expand="block"
          class="login-submit"
          [disabled]="cargando()">
          <ion-icon name="log-in-outline" slot="start" *ngIf="!cargando()"></ion-icon>
          <ion-spinner name="crescent" *ngIf="cargando()"></ion-spinner>
          <span *ngIf="!cargando()">Iniciar sesión</span>
          <span *ngIf="cargando()">Iniciando sesión...</span>
        </ion-button>

      </form>

      <div class="login-footer">
        <p>¿Problemas para ingresar? Contacta al administrador del sistema.</p>
        <p class="login-version">v1.0.0</p>
      </div>
    </div>
  </div>
</ion-content>
