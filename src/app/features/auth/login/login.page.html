<ion-content [fullscreen]="true" class="login-content">
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-brand">
        <img src="assets/logo/logo-institucional.jpeg" alt="Logo institucional" class="login-logo" />
        <h1 class="login-title">Sistema de Evaluación</h1>
        <p class="login-subtitle">Ingresa con tu cuenta institucional</p>
      </div>

      <form (ngSubmit)="onSubmit()" class="login-form">

        <ion-item class="login-input" lines="none">
          <ion-icon name="person-outline" slot="start"></ion-icon>
          <ion-input
            type="text"
            inputmode="numeric"
            placeholder="Cédula"
            [(ngModel)]="cedula"
            name="cedula"
            autocomplete="username"
            required>
          </ion-input>
        </ion-item>

        <ion-item class="login-input" lines="none">
          <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
          <ion-input
            [type]="mostrarPassword ? 'text' : 'password'"
            placeholder="Contraseña"
            [(ngModel)]="password"
            name="password"
            autocomplete="current-password"
            required>
          </ion-input>
          <ion-button
            slot="end"
            fill="clear"
            type="button"
            (click)="mostrarPassword = !mostrarPassword">
            {{ mostrarPassword ? 'Ocultar' : 'Ver' }}
          </ion-button>
        </ion-item>

        <p class="login-error" *ngIf="errorMensaje()">
          {{ errorMensaje() }}
        </p>

        <ion-button
          type="submit"
          expand="block"
          class="login-submit"
          [disabled]="cargando()">
          <ion-icon name="log-in-outline" slot="start" *ngIf="!cargando()"></ion-icon>
          <ion-spinner name="crescent" *ngIf="cargando()"></ion-spinner>
          <span *ngIf="!cargando()">Iniciar sesión</span>
        </ion-button>

      </form>

      <p class="login-footer">
        ¿Problemas para ingresar? Contacta al administrador del sistema.
      </p>
    </div>
  </div>
</ion-content>
