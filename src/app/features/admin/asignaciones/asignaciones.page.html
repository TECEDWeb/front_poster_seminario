<ion-header>
  <ion-toolbar class="toolbar-custom">

    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>

    <ion-title>Asignación de proyectos</ion-title>

    <ion-buttons slot="end">
      <ion-button class="btn-add">
        <ion-icon name="add-outline" slot="start"></ion-icon>
        Nuevo
      </ion-button>
    </ion-buttons>

  </ion-toolbar>
</ion-header>

<ion-content class="assign-content">

  <div class="page-wrapper">

    <!-- HEADER -->
    <div class="page-hero">
      <h1>Asignación de evaluadores</h1>
      <p>Selecciona un proyecto y asígnalo a un evaluador disponible</p>
    </div>

    <!-- CARD -->
    <ion-card class="form-card">

      <ion-card-header>
        <ion-card-title>
          <ion-icon name="swap-horizontal-outline"></ion-icon>
          Asignar evaluador
        </ion-card-title>
        <ion-card-subtitle>
          Gestión de asignaciones de evaluación
        </ion-card-subtitle>
      </ion-card-header>

      <ion-card-content>

        <!-- PROYECTO -->
        <div class="field">
          <label>Proyecto</label>

          <ion-item class="custom-item" lines="none">
            <ion-select
              [(ngModel)]="proyectoId"
              interface="action-sheet"
              placeholder="Selecciona un proyecto">

              <ion-select-option *ngFor="let p of proyectos" [value]="p.id">
                {{ p.nombre }}
              </ion-select-option>

            </ion-select>
          </ion-item>
        </div>

        <!-- EVALUADOR -->
        <div class="field">
          <label>Evaluador</label>

          <ion-item class="custom-item" lines="none">
            <ion-select
              [(ngModel)]="evaluadorId"
              interface="action-sheet"
              placeholder="Selecciona un evaluador">

              <ion-select-option *ngFor="let e of evaluadores" [value]="e.id">
                {{ e.nombre }}
              </ion-select-option>

            </ion-select>
          </ion-item>
        </div>

        <!-- BOTÓN -->
        <ion-button
          expand="block"
          class="assign-btn"
          (click)="guardar()"
          [disabled]="!proyectoId || !evaluadorId">

          <ion-icon name="checkmark-circle-outline" slot="start"></ion-icon>
          Asignar proyecto

        </ion-button>

      </ion-card-content>
    </ion-card>

  </div>

</ion-content>
