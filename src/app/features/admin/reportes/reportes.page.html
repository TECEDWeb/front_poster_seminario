<div class="section-title">

<h2>
Reportes por proyecto
</h2>

</div>



<div
class="pro-card"
*ngFor="let p of proyectos">


<h2>
{{p.proyecto}}
</h2>


<div class="detalle">


<p>
<b>Evaluaciones:</b>

{{p.evaluaciones}}

</p>


<p>
<b>Promedio:</b>

{{p.promedio | number:'1.1-2'}}

pts

</p>


</div>



<div
class="ranking-row"
*ngFor="let e of p.evaluadores">


<div class="rank-info">


<div class="rank-nombre">

{{e.nombre}}

</div>


<div class="rank-meta">

{{e.rol}}

</div>


</div>



<div class="rank-puntaje">

{{e.puntaje}}

</div>


</div>



</div>
