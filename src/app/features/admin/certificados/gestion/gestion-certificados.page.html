<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Gestión de Certificados</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="container">
    <ion-card>
      <ion-card-header>
        <ion-card-title>Administrar Certificados</ion-card-title>
        <ion-card-subtitle>Gestión completa de certificados</ion-card-subtitle>
      </ion-card-header>
      <ion-card-content>
        <p>Aquí podrás gestionar todos los certificados del sistema.</p>
        <ion-button expand="block" routerLink="/admin/certificados/generar">
          <ion-icon name="add-outline" slot="start"></ion-icon>
          Generar Nuevo Certificado
        </ion-button>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
