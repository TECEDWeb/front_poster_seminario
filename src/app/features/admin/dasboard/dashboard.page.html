<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Dashboard</ion-title>
    <ion-buttons slot="end">
      <ion-button fill="clear">
        <ion-icon name="notifications-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="page-container">

    <!-- Error -->
    <div class="error-banner" *ngIf="error && !cargando">
      <ion-icon name="alert-circle-outline"></ion-icon>
      No se pudo cargar el resumen.
      <ion-button fill="clear" size="small" color="danger" (click)="cargarResumen()">
        Reintentar
      </ion-button>
    </div>

    <!-- Bienvenida -->
    <div class="page-header" *ngIf="!error">
      <div>
        <h1>Bienvenido de vuelta</h1>
        <p>Aquí tienes el resumen general del sistema</p>
      </div>
    </div>

    <!-- Skeleton -->
    <div class="stats-grid" *ngIf="cargando">
      <div class="stat-skeleton" *ngFor="let i of [1,2,3,4]">
        <ion-skeleton-text animated style="width:44px;height:44px;border-radius:10px"></ion-skeleton-text>
        <div>
          <ion-skeleton-text animated style="width:48px;height:22px;border-radius:4px;margin-bottom:6px"></ion-skeleton-text>
          <ion-skeleton-text animated style="width:72px;height:12px;border-radius:4px"></ion-skeleton-text>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid" *ngIf="!cargando && !error">
      <app-stats-card
        titulo="Usuarios"
        [valor]="usuarios"
        icono="people-outline"
        color="indigo">
      </app-stats-card>
      <app-stats-card
        titulo="Concursos"
        [valor]="concursos"
        icono="trophy-outline"
        color="amber">
      </app-stats-card>
      <app-stats-card
        titulo="Proyectos"
        [valor]="proyectos"
        icono="folder-outline"
        color="emerald">
      </app-stats-card>
      <app-stats-card
        titulo="Evaluaciones"
        [valor]="reportes"
        icono="document-text-outline"
        color="violet">
      </app-stats-card>
    </div>

    <!-- Acciones rápidas -->
    <div class="section-title">
      <h2>Acciones rápidas</h2>
    </div>

    <div class="acciones-grid">
      <button class="accion-btn" routerLink="/admin/usuarios">
        <div class="accion-icon indigo"><ion-icon name="person-add-outline"></ion-icon></div>
        <span>Nuevo usuario</span>
      </button>
      <button class="accion-btn" routerLink="/admin/concursos">
        <div class="accion-icon amber"><ion-icon name="add-circle-outline"></ion-icon></div>
        <span>Nuevo concurso</span>
      </button>
      <button class="accion-btn" routerLink="/admin/proyectos">
        <div class="accion-icon emerald"><ion-icon name="folder-open-outline"></ion-icon></div>
        <span>Ver proyectos</span>
      </button>
      <button class="accion-btn" routerLink="/admin/reportes">
        <div class="accion-icon violet"><ion-icon name="bar-chart-outline"></ion-icon></div>
        <span>Ver reportes</span>
      </button>
    </div>

  </div>
</ion-content>
