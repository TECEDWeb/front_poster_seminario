<app-header titulo="Formulario de Evaluación"></app-header>

<ion-content class="ion-padding">

  <!-- LOADING -->
  <div *ngIf="cargando">
    <p>Cargando formulario...</p>
  </div>

  <!-- TITULO RUBRICA -->
  <h2 *ngIf="formulario">
    {{ formulario?.rubrica?.nombre }}
  </h2>

  <!-- SECCIONES -->
  <div *ngFor="let seccion of formulario?.secciones || []">

    <h3 class="seccion-titulo">
      {{ seccion?.nombre }}
    </h3>

    <!-- CRITERIOS -->
    <div *ngFor="let criterio of seccion?.criterios || []" class="criterio-card">

      <p class="criterio-texto">
        <b>{{ criterio?.texto }}</b>
      </p>

      <ion-radio-group [(ngModel)]="respuestas[criterio.id]">

        <!-- NIVELES -->
        <ion-item *ngFor="let nivel of criterio?.niveles || []">

          <ion-label>
            {{ nivel.nombre }} ({{ nivel.puntaje }})
          </ion-label>

          <ion-radio
            slot="start"
            [value]="nivel.id"
            (ionSelect)="seleccionar(criterio.id, nivel.id)">
          </ion-radio>

        </ion-item>

      </ion-radio-group>

    </div>

  </div>

  <!-- OBSERVACIONES -->
  <ion-item class="observacion-box">
    <ion-label position="stacked">Observaciones</ion-label>
    <textarea [(ngModel)]="observacion"></textarea>
  </ion-item>

  <!-- BOTON GUARDAR -->
  <ion-button expand="block" (click)="guardar()">
    Guardar Evaluación
  </ion-button>

</ion-content>
