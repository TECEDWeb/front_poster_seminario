<ion-content class="ion-padding">

  <h2>Reportes Públicos</h2>

  <ion-card *ngFor="let r of reportes">

    <ion-card-header>
      <ion-card-title>{{ r.titulo }}</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <p>{{ r.descripcion }}</p>
    </ion-card-content>

  </ion-card>

</ion-content>
